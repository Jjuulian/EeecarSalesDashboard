<div class="bg-glow"></div>

<main class="app">
  <header class="topbar">
    <div class="brand">
      <h1>Panel de Ventas</h1>
      <p>EECAR</p>
    </div>

    <div class="status-pill">
      <span class="dot"></span>
      <span>En línea</span>
    </div>
  </header>

  <section class="tabs">
    <button class="tab" [class.active]="activeTab==='resumen'" (click)="activeTab='resumen'">
      Resumen
    </button>

    <button class="tab" [class.active]="activeTab==='propios'" (click)="activeTab='propios'">
      Propios
    </button>
  </section>

  <section class="data">
    <app-main-dashboard *ngIf="activeTab==='resumen'"></app-main-dashboard>
    <app-personal-dashboard *ngIf="activeTab==='propios'"></app-personal-dashboard>
  </section>
</main>
